# Extended Kalman Filter — kết hợp odometry LiDAR (rf2o) + IMU (MPU6050)
# Output: /odometry/filtered + TF odom→base_link
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false

    map_frame:       map
    odom_frame:      odom
    base_link_frame: base_link
    world_frame:     odom

    # 1. Odometry từ rf2o_laser_odometry (LiDAR scan matching)
    # Chỉ lấy vận tốc tuyến tính X (vx) — robot không có encoder
    odom0: /odom_rf2o
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, false,
                   false, false, false]
    odom0_queue_size: 15

    # 2. IMU từ MPU6050 qua Raspberry Pi
    # Chỉ lấy yaw rate (angular velocity Z)
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 15
    imu0_remove_gravitational_acceleration: true
